<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>e-Nilai Praktik Mupa</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            <h2>e-Nilai Mupa</h2>
            <small>SMK Muhammadiyah Pakem</small>
        </div>

        <button onclick="dashboard()">
            🏠 Dashboard
        </button>

        <button onclick="halamanSiswa()">
            👨 Siswa
        </button>

        <button onclick="halamanInput()">
            📝 Input Nilai
        </button>

        <button onclick="halamanRekap()">
            📊 Rekap Nilai
        </button>

        <div class="versi">
            Versi 1.0
        </div>

    </aside>


    <!-- Main -->
    <main class="main">

        <div class="header">

            <div>
                <h1>Dashboard</h1>
                <small>e-Nilai Praktik TSM Mupa</small>
            </div>

        </div>

        <div id="konten">

            <div class="grid">

                <div class="info-box">
                    <p>Total Kelas</p>
                    <h2>3</h2>
                </div>

                <div class="info-box">
                    <p>Total Siswa</p>
                    <h2>108</h2>
                </div>

                <div class="info-box">
                    <p>Jobsheet</p>
                    <h2>12</h2>
                </div>

                <div class="info-box">
                    <p>Progress</p>
                    <h2>75%</h2>
                </div>

            </div>

        </div>

    </main>

</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>

</body>
</html>
